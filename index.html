<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bai+Jamjuree:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;1,200;1,300;1,400;1,500;1,600;1,700&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <title>Frontend Mentor | Clipboard landing page</title>
  
</head>
<body>
  <main class="bg-[url('images/bg-header-desktop.png')] bg-cover bg-center bg-no-repeat">
    <section class="items-center">
      <div class=" text-center pt-30 font-[Bai Jamjuree]">
        <div class="flex items-center justify-center">
          <img src="images/logo.svg" alt="icon">
        </div>
      <h1 class="pt-20 text-4xl lg:text-6xl text-gray-700 font-bold max-w-sm mx-auto md:max-w-full ">A history of everything you copy</h1>
      <p class="text-md md:text-2xl p-5 text-gray-500 max-w-4xl mx-auto">Clipboard allows you to track and organize everything you copy. Instantly access your clipboard on all your devices.</p>
      </div>
      <div class="flex flex-col md:flex-row justify-center p-5 justify-between gap-6 text-gray-100">
        <button class="bg-green-300 p-4  rounded-full text-lg font-semibold shadow-xl">Download for iOS</button>
        <button class="bg-blue-400 p-4 rounded-full text-lg font-semibold shadow-xl">Download for Mac</button>
      </div>
    </section>
    

  

  <!--

  Keep track of your snippets

  Clipboard instantly stores any item you copy in the cloud, 
  meaning you can access your snippets immediately on all your 
  devices. Our Mac and iOS apps will help you organize everything.

  Quick Search

  Easily search your snippets by content, category, web address, application, and more.

  iCloud Sync

  Instantly saves and syncs snippets across all your devices.

  Complete History

  Retrieve any snippets from the first moment you started using the app.

  Access Clipboard anywhere

  Whether you’re on the go, or at your computer, you can access all your Clipboard 
  snippets in a few simple clicks.

  Supercharge your workflow

  We’ve got the tools to boost your productivity.

  Create blacklists

  Ensure sensitive information never makes its way to your clipboard by excluding certain sources.

  Plain text snippets

  Remove unwanted formatting from copied text for a consistent look.

  Sneak preview

  Quick preview of all snippets on your Clipboard for easy access.

  Clipboard for iOS and Mac OS

  Available for free on the App Store. Download for Mac or iOS, sync with iCloud 
  and you’re ready to start adding to your clipboard.

  Download for iOS
  Download for Mac

  FAQs
  Contact Us
  Privacy Policy
  Press Kit
  Install Guide
  -->
  
  </main>

</body>
</html>
